<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thay đổi giá trị của thuộc tính</title>

    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
  </head>

  <body>
    <div class="container mt-5">
      <h2>Hãy nhập hai số và click vào nút Tính tổng</h2>

      <form name="TinhToan">
        <input type="text" name="SoHang1" /> +
        <input type="text" name="SoHang2" /> =
        <input type="text" name="KetQua" />

        <input
          type="button"
          value="Tính tổng"
          onClick="TinhToan.KetQua.value = parseFloat(TinhToan.SoHang1.value) + parseFloat(TinhToan.SoHang2.value)"
        />
      </form>
    </div>
  </body>
</html>
