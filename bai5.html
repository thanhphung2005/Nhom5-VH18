
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bài 5 - Radio Button</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center text-primary mb-4">Chọn kích thước kem</h3>

        <div class="form-check">
            <input class="form-check-input" type="radio" value="Lớn" name="co" checked>
            <label class="form-check-label">Lớn</label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="radio" value="Vừa" name="co">
            <label class="form-check-label">Vừa</label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="radio" value="Nhỏ" name="co">
            <label class="form-check-label">Nhỏ</label>
        </div>

        <button class="btn btn-primary mt-3" onclick="chonco()">Chọn cỡ</button>

        <hr>

        <h4 id="coKemDaChon" class="text-success text-center"></h4>
    </div>
</div>

<script>
function chonco(){
    let size="";
    let arr = document.getElementsByName("co");

    for (let i = 0; i < arr.length; i++) {
        if (arr[i].checked) {
            size = arr[i].value;
        }
    }

    let str = "Kích thước bạn đã chọn là: " + size;
    let kq = document.getElementById("coKemDaChon");
    kq.innerHTML = str;

    if(size == "Lớn"){
        kq.style.fontSize = "40px";
    }
    if(size == "Vừa"){
        kq.style.fontSize = "28px";
    }
    if(size == "Nhỏ"){
        kq.style.fontSize = "18px";
    }
}
</script>

</body>
</html>
